<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breathing Piano</title>
  <meta name="description" content="An immersive instrument that transforms your breath into piano music.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="overlay" class="overlay">
    <div class="overlay-content">
      <h1 class="overlay-title">Breathing Piano</h1>
      <p class="overlay-subtitle">Click anywhere to begin</p>
      <p id="overlay-error" class="overlay-error"></p>
    </div>
  </div>

  <div id="status" class="status"></div>

  <div id="debug-meter" class="debug-meter">
    <div id="debug-bar" class="debug-bar"></div>
    <span id="debug-value" class="debug-value">0.000</span>
  </div>

  <script src="script.js"></script>
</body>
</html>
